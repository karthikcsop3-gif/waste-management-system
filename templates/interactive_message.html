<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    position:relative;
}

/* Soft Animated Background */

.bg{
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(255,255,255,0.04);
    filter:blur(80px);
    animation:move 8s ease-in-out infinite;
}

.bg2{
    width:400px;
    height:400px;
    right:-100px;
    bottom:-100px;
    animation-delay:2s;
}

@keyframes move{
    0%,100%{
        transform:translate(0,0);
    }
    50%{
        transform:translate(40px,-30px);
    }
}

/* Main Glass Card */

.container{
    width:90%;
    max-width:950px;
    padding:70px 50px;
    border-radius:28px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
    text-align:center;
    position:relative;
    overflow:hidden;
    animation:fade 1s ease;
    transition:0.4s;
}

.container:hover{
    transform:translateY(-4px);
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Emoji */

.emoji{
    font-size:5rem;
    margin-bottom:25px;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

/* Text */

h1{
    color:white;
    font-size:3.5rem;
    line-height:1.5;
    font-weight:700;
}

.highlight{
    color:#60a5fa;
}

/* Button */

button{
    margin-top:40px;
    padding:14px 32px;
    border:none;
    border-radius:50px;
    background:#1e293b;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.08);
}

button:hover{
    background:#334155;
    transform:scale(1.05);
}

/* Floating Dots */

.dot{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

@media(max-width:768px){

    h1{
        font-size:2rem;
    }

    .container{
        padding:45px 25px;
    }

    .emoji{
        font-size:4rem;
    }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="bg bg2"></div>

<div class="dot" style="left:10%; animation-duration:8s;"></div>
<div class="dot" style="left:25%; animation-duration:12s;"></div>
<div class="dot" style="left:45%; animation-duration:9s;"></div>
<div class="dot" style="left:70%; animation-duration:11s;"></div>
<div class="dot" style="left:85%; animation-duration:7s;"></div>

<div class="container">

    <div class="emoji">😂</div>

    <h1>
        Online implementation madodu
        <br>
        <span class="highlight">tumba kasta aite :)</span>
        <br><br>
        Class nall sigi
        <br>
        <span class="highlight">
            project torstini bekadre
        </span>
    </h1>

    <button onclick="changeText()">
        Click Here
    </button>

</div>

<script>

function changeText(){

    const btn = document.querySelector("button");

    btn.innerHTML = "See You In Class 😎";

    btn.style.background = "#475569";
}

</script>

</body>
</html>
